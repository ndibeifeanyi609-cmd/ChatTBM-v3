<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatTBM</title>
    <link rel="icon" href="IMG_4365.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <main class="main">

        <!-- Welcome -->
        <section class="welcome" id="welcome-screen">
            <img src="IMG_4365.png" class="hero-logo" alt="ChatTBM Logo">
            <h1>ChatTBM</h1>
            <p>Your AI Content Assistant for Captions, Scripts & Viral Ideas</p>

            <div class="prompt-cards">
                <div class="card" data-prompt="Create a viral caption for my latest video">✍️ Create a viral caption</div>
                <div class="card" data-prompt="Give me 5 viral video ideas for Instagram Reels">🎬 Generate video ideas</div>
                <div class="card" data-prompt="Write a fire Instagram post about personal growth">📱 Write social media posts</div>
            </div>
        </section>

        <!-- Chat -->
        <section class="chat-container" id="chat-container">
            <div id="chat-box"></div>
        </section>

        <!-- Input -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask anything...">
            <button id="send-btn">Send</button>
        </div>

    </main>
</div>

<script src="script.js"></script>
</body>
</html>
