<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatTBM</title>
    <link rel="icon" href="IMG_4365.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Logo -->
        <div class="header">
            <img src="IMG_4365.png" alt="ChatTBM" class="logo">
            <h1>ChatTBM</h1>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="action-btn">✍️ Create a viral caption</button>
            <button class="action-btn">🎬 Generate video ideas</button>
            <button class="action-btn">📱 Write social media posts</button>
        </div>

        <!-- Input -->
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Ask anything..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
